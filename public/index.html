<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLS Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --panel:     #1e1e1e;
      --border:    #2a2a2a;
      --border2:   #333;
      --accent:    #0054D1;
       --accent2:   #5C9DFF;
      --accent-dim: rgba(200,219,250,0.12);
      --text:      #e8e8e8;
      --text-2:    #999;
      --text-3:    #555;
      --online:    #22c55e;
      --danger:    #ef4444;
      --mono:      'Montserrat', sans-serif;
--sans:      'Montserrat', sans-serif;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ══════════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════════ */
    #login {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
      background-size: 40px 40px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 40px;
      width: 420px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(245,158,11,0.08);
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { fill: #000; }

    .logo-text h1 {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 1px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      background: transparent;
      border: none;
      transition: all 0.2s;
      font-family: var(--sans);
    }

    .tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .tab:hover:not(.active) { background: rgba(255,255,255,0.03); color: var(--text); }

    /* Tab content */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Write name */
    .field-label {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .text-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--text-3); }

    /* User grid */
    .user-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .user-btn {
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text-2);
      font-size: 14px;
      font-family: var(--sans);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .user-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .user-avatar-sm {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .btn-enter {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-enter:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-enter:active { transform: translateY(0); }
    .btn-enter:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ══════════════════════════════════
       CHAT SCREEN
    ══════════════════════════════════ */
    #chat {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo svg { fill: #000; }

    .header-title {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .header-status {
      font-size: 12px;
      color: var(--online);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--online);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .current-user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 12px 5px 6px;
      font-size: 13px;
      color: var(--text-2);
    }

    .chip-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Body: sidebar + messages */
    .chat-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-2);
      transition: background 0.15s;
    }

    .user-item:hover { background: rgba(255,255,255,0.03); }

    .user-item .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--panel);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--accent);
    }

    .user-item .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--online);
      margin-left: auto;
      flex-shrink: 0;
    }

    .no-users {
      padding: 16px;
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    /* Messages area */
    .messages-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Message bubble */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 12px;
    }

    .msg-group.own { align-items: flex-end; }
    .msg-group.other { align-items: flex-start; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .msg-group.own .msg-meta { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--panel);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--accent);
    }

    .msg-group.own .msg-avatar { color: #000; background: var(--accent); border-color: var(--accent2); }

    .msg-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-group.other .bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
      color: var(--text);
    }

    .msg-group.own .bubble {
      background: var(--accent);
      color: #000;
      border-top-right-radius: 3px;
      font-weight: 400;
    }

    /* File attachment */
    .attachment {
      margin-top: 8px;
    }

    .attachment img {
      max-width: 280px;
      max-height: 200px;
      border-radius: 6px;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
      object-fit: cover;
    }

    .attachment img:hover { opacity: 0.85; }

    .file-card {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      max-width: 280px;
      transition: background 0.2s;
    }

    .msg-group.own .file-card { background: rgba(0,0,0,0.15); border-color: rgba(0,0,0,0.2); color: #000; }
    .file-card:hover { background: rgba(0,0,0,0.3); }

    .file-icon {
      font-size: 22px;
      flex-shrink: 0;
    }

    .file-info { min-width: 0; }
    .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 11px; opacity: 0.6; margin-top: 1px; font-family: var(--mono); }

    /* System message */
    .msg-system {
      text-align: center;
      margin: 8px 0;
    }

    .msg-system span {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-family: var(--mono);
    }

    /* Historial divider */
    .history-divider {
      text-align: center;
      margin: 16px 0 8px;
    }

    .history-divider span {
      font-size: 10px;
      color: var(--text-3);
      background: var(--accent-dim);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 20px;
      padding: 3px 12px;
      font-family: var(--mono);
    }

    /* ─── INPUT AREA ─── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    /* File preview */
    #file-preview {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      margin-bottom: 10px;
      font-size: 13px;
    }

    #file-preview.show { display: flex; }
    #preview-name { flex: 1; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #preview-img { max-height: 60px; border-radius: 4px; display: none; }
    #preview-img.show { display: block; }

    .remove-file {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 16px;
      padding: 2px;
      line-height: 1;
      transition: color 0.15s;
    }

    .remove-file:hover { color: var(--danger); }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .attach-btn {
      width: 42px;
      height: 42px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      color: var(--text-2);
    }

    .attach-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .message-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 11px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .message-input:focus { border-color: var(--accent); }
    .message-input::placeholder { color: var(--text-3); }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn svg { fill: #000; }

    /* Typing hint */
    .input-hint {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 6px;
      font-family: var(--mono);
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: var(--shadow);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index: 100;
      max-width: 280px;
    }

    #toast.show { transform: translateX(0); }
    #toast-name { font-weight: 600; color: var(--accent); font-size: 12px; margin-bottom: 2px; }
    #toast-text { color: var(--text-2); }

    /* Image lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.show { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; }

    /* Upload progress */
    #upload-progress {
      display: none;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-2);
      font-family: var(--mono);
      z-index: 50;
    }

    #upload-progress.show { display: block; }

    /* Responsive mobile */
    @media (max-width: 600px) {
      .sidebar { width: 56px; }
      .sidebar-header, .user-item .user-name, .user-item .online-dot { display: none; }
      .user-item { justify-content: center; padding: 10px; }
      .login-card { width: calc(100vw - 32px); padding: 28px 20px; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <div class="logo-text">
        <h1>CLS</h1>
        <p>Chat interno</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('escribir')">✏️ Escribir nombre</button>
      <button class="tab" onclick="switchTab('elegir')">👤 Elegir usuario</button>
    </div>

    <!-- Escribir nombre -->
    <div id="tab-escribir" class="tab-panel active">
      <div class="field-label">Tu nombre</div>
      <input
        class="text-input"
        id="input-nombre"
        type="text"
        placeholder="Escribí tu nombre..."
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
      >
    </div>

    <!-- Elegir de la lista -->
    <div id="tab-elegir" class="tab-panel">
      <div class="field-label">Seleccioná tu usuario</div>
      <div class="user-grid" id="user-grid">
        <!-- populated by JS -->
      </div>
    </div>

    <button class="btn-enter" id="btn-enter" onclick="entrar()" disabled>
      Entrar al chat →
    </button>
  </div>
</div>

<!-- ═══════════ CHAT ═══════════ -->
<div id="chat">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <div>
        <div class="header-title">CLS Chat</div>
        <div class="header-status">
          <div class="status-dot"></div>
          <span id="online-count">0 conectados</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="current-user-chip">
        <div class="chip-avatar" id="my-avatar-chip"></div>
        <span id="my-name-chip"></span>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="chat-body">

    <!-- Sidebar: usuarios -->
    <div class="sidebar">
      <div class="sidebar-header">Conectados</div>
      <div class="users-list" id="users-list">
        <div class="no-users">—</div>
      </div>
    </div>

    <!-- Messages + input -->
    <div class="messages-container">
      <div class="messages" id="messages"></div>

      <div class="input-area" style="position:relative">
        <div id="upload-progress">⏳ Subiendo archivo...</div>

        <!-- File preview -->
        <div id="file-preview">
          <img id="preview-img" src="" alt="">
          <span id="preview-name"></span>
          <button class="remove-file" onclick="clearFile()">✕</button>
        </div>

        <div class="input-row">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Adjuntar archivo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea
            class="message-input"
            id="message-input"
            placeholder="Escribí un mensaje..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button class="send-btn" onclick="sendMessage()" title="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast">
  <div id="toast-name"></div>
  <div id="toast-text"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- File input (hidden) -->
<input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar,.csv">

<script>
  // ─────────────────────────────
  // STATE
  // ─────────────────────────────

  let socket;
  let myName = '';
  let pendingFile = null;
  let selectedListUser = '';
  let activeTab = 'escribir';
  let lastSender = null;
  let audioCtx = null;

  // NUEVO
  let chatActivo = 'todos';
  let privados = {};
  let unread = {};
  let historialMensajesCache = [];
  // ─────────────────────────────
  // LOGIN
  // ─────────────────────────────

  async function initLogin() {
    const res = await fetch('/api/usuarios');
    const usuarios = await res.json();

    const grid = document.getElementById('user-grid');
    grid.innerHTML = '';

    usuarios.forEach(nombre => {

      const btn = document.createElement('button');

      btn.className = 'user-btn';

      btn.innerHTML = `
        <span class="user-avatar-sm">
          ${initials(nombre)}
        </span>
        ${nombre}
      `;

      btn.onclick = () => selectUser(nombre, btn);

      grid.appendChild(btn);
    });
  }

  function switchTab(tab) {

    activeTab = tab;

    document.querySelectorAll('.tab')
      .forEach(t => t.classList.remove('active'));

    document.querySelectorAll('.tab-panel')
      .forEach(p => p.classList.remove('active'));

    event.target.classList.add('active');

    document.getElementById(`tab-${tab}`)
      .classList.add('active');

    selectedListUser = '';

    document.querySelectorAll('.user-btn')
      .forEach(b => b.classList.remove('selected'));

    checkEnterBtn();
  }

  function selectUser(nombre, btn) {

    document.querySelectorAll('.user-btn')
      .forEach(b => b.classList.remove('selected'));

    btn.classList.add('selected');

    selectedListUser = nombre;

    checkEnterBtn();
  }

  document.getElementById('input-nombre')
    .addEventListener('input', checkEnterBtn);

  document.getElementById('input-nombre')
    .addEventListener('keydown', (e) => {

      if (e.key === 'Enter') {
        entrar();
      }
    });

  function checkEnterBtn() {

    const btn = document.getElementById('btn-enter');

    if (activeTab === 'escribir') {

      const val = document.getElementById('input-nombre')
        .value
        .trim();

      btn.disabled = val.length < 2;

    } else {

      btn.disabled = !selectedListUser;
    }
  }

  function entrar() {

    const nombre = activeTab === 'escribir'
      ? document.getElementById('input-nombre').value.trim()
      : selectedListUser;

    if (!nombre || nombre.length < 2) return;

    myName = nombre;

    startChat();
  }

  // ─────────────────────────────
  // START CHAT
  // ─────────────────────────────

  function startChat() {

    document.getElementById('login').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';

    document.getElementById('my-name-chip')
      .textContent = myName;

    document.getElementById('my-avatar-chip')
      .textContent = initials(myName);

    socket = io();

    socket.on('connect', () => {
      socket.emit('unirse', myName);
    });

    socket.on('login_error', (msg) => {

  alert(msg);

  location.reload();
});

    socket.on('historial', (msgs) => {

      historialMensajesCache = msgs;

      const messagesEl = document.getElementById('messages');

      messagesEl.innerHTML = '';

      lastSender = null;

      if (msgs.length > 0) {

        const div = document.createElement('div');

        div.className = 'history-divider';

        div.innerHTML = `
          <span>— Historial de mensajes —</span>
        `;

        messagesEl.appendChild(div);

        msgs.forEach(m => renderMessage(m, false));
      }

      scrollToBottom();
    });

    // MENSAJE NORMAL
    socket.on('mensaje', (msg) => {

  // guardar también en cache
  historialMensajesCache.push(msg);

  if (chatActivo === 'todos') {

    renderMessage(msg, true);

    scrollToBottom();

  } else {

    unread['todos'] = (unread['todos'] || 0) + 1;
  }

  playSound();
});

    // MENSAJE PRIVADO
    socket.on('mensaje_privado', (msg) => {

      const otro =
        msg.de === myName
          ? msg.para
          : msg.de;

      if (!privados[otro]) {
        privados[otro] = [];
      }

      privados[otro].push(msg);

      if (chatActivo === otro) {

        renderPrivados();

      } else {

        unread[otro] = (unread[otro] || 0) + 1;
      }

      renderUsers(lastUsers || []);

      playSound();

      if (msg.de !== myName) {

  showToast(
    msg.de,
    msg.texto
  );
}
    });

    socket.on('usuarios', (lista) => {

      lastUsers = lista;

      renderUsers(lista);
    });

    socket.on('escribiendo', (nombre) => {

      const hint = document.querySelector('.input-hint');

      hint.textContent =
        `${nombre} está escribiendo...`;

      clearTimeout(window.typingTimeout);

      window.typingTimeout = setTimeout(() => {

        hint.textContent =
          'Enter para enviar · Shift+Enter para nueva línea';

      }, 1500);
    });

    socket.on('disconnect', () => {

      renderSystemMsg(
        '⚠️ Conexión perdida. Reconectando...'
      );
    });
  }

  // ─────────────────────────────
  // USERS SIDEBAR
  // ─────────────────────────────

  let lastUsers = [];

  function renderUsers(lista) {

  const el = document.getElementById('users-list');

  el.innerHTML = '';

  // TODOS
  const todos = createUserItem('todos', true);

  el.appendChild(todos);

  // USUARIOS
  lista.forEach(nombre => {

    // NO mostrarme a mí mismo
    if (nombre === myName) return;

    const item = createUserItem(nombre);

    el.appendChild(item);
  });

  document.getElementById('online-count')
    .textContent = `${lista.length} conectados`;
}

  function createUserItem(nombre, isTodos = false) {

  const item = document.createElement('div');

  item.className = 'user-item';

  if (chatActivo === nombre) {
    item.style.background = 'rgba(200,219,250,0.05)';
  }

  const badge =
    unread[nombre]
      ? `<span style="
          background:#f59e0b;
          color:#000;
          font-size:10px;
          border-radius:20px;
          padding:2px 6px;
          margin-left:auto;
          font-weight:700;
        ">
          ${unread[nombre]}
        </span>`
      : '<div class="online-dot"></div>';

  item.innerHTML = `
    <div class="avatar">
      ${isTodos ? '#' : initials(nombre)}
    </div>

    <div class="user-name">
      ${isTodos ? 'Todos' : nombre}
    </div>

    ${badge}
  `;

  item.onclick = () => {

    chatActivo = nombre;

    if (chatActivo === nombre) {
  unread[nombre] = 0;
}

    renderUsers(lastUsers);

    if (chatActivo === 'todos') {

      historialMensajesRender();

    } else {

      renderPrivados();
    }
  };

  return item;
}

  // ─────────────────────────────
  // ENVIAR
  // ─────────────────────────────

  async function sendMessage() {

    const input = document.getElementById('message-input');

    const texto = input.value.trim();

    if (!texto && !pendingFile) return;

    const payload = {
      texto
    };

    if (chatActivo === 'todos') {

      socket.emit('mensaje', payload);

    } else {

      socket.emit('mensaje_privado', {
        para: chatActivo,
        texto
      });
    }

    input.value = '';

    autoResize(input);
  }

  // ─────────────────────────────
  // PRIVADOS
  // ─────────────────────────────

  function renderPrivados() {

    const messagesEl =
      document.getElementById('messages');

    messagesEl.innerHTML = '';

    lastSender = null;

    (privados[chatActivo] || [])
      .forEach(msg => {

        renderMessage({
          nombre: msg.de,
          texto: msg.texto,
          timestamp: msg.timestamp
        }, false);
      });

    scrollToBottom();
  }

  // ─────────────────────────────
  // HELPERS
  // ─────────────────────────────

  function renderMessage(msg, animate = true) {

    if (msg.tipo === 'sistema') {

      renderSystemMsg(msg.texto);

      return;
    }

    const own = msg.nombre === myName;

    const group = document.createElement('div');

    group.className =
      `msg-group ${own ? 'own' : 'other'}`;

    const time = new Date(msg.timestamp)
      .toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    const currentDate = new Date(msg.timestamp)
  .toLocaleDateString();

if (lastDate !== currentDate) {

  lastDate = currentDate;

  const divider = document.createElement('div');

  divider.className = 'history-divider';

  divider.innerHTML = `
    <span>${currentDate}</span>
  `;

  document.getElementById('messages')
    .appendChild(divider);
}
    group.innerHTML = `
      <div class="msg-meta">
        <div class="msg-avatar">
          ${initials(msg.nombre)}
        </div>

        <div class="msg-name">
          ${msg.nombre}
        </div>

        <div class="msg-time">
          ${time}
        </div>
      </div>

      <div class="bubble">
  ${escapeHtml(msg.texto)}

  <div style="
    font-size:11px;
    opacity:.6;
    margin-top:4px;
    text-align:right;
  ">
    ${time}
  </div>
</div>
    `;

    if (animate) {
      group.style.opacity = '0';

      requestAnimationFrame(() => {
        group.style.transition = 'opacity .15s';
        group.style.opacity = '1';
      });
    }

    document.getElementById('messages')
      .appendChild(group);
  }

  function renderSystemMsg(texto) {

    const div = document.createElement('div');

    div.className = 'msg-system';

    div.innerHTML = `<span>${texto}</span>`;

    document.getElementById('messages')
      .appendChild(div);
  }

  function historialMensajesRender() {

  const messagesEl =
    document.getElementById('messages');

  messagesEl.innerHTML = '';

  lastSender = null;
  let lastDate = null;

  historialMensajesCache.forEach(m => {
    renderMessage(m, false);
  });

  scrollToBottom();
}

  function showToast(nombre, texto) {

    const toast =
      document.getElementById('toast');

    document.getElementById('toast-name')
      .textContent = nombre;

    document.getElementById('toast-text')
      .textContent = texto;

    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  function scrollToBottom() {

    const messages =
      document.getElementById('messages');

    messages.scrollTop =
      messages.scrollHeight;
  }

  function initials(nombre) {

    return nombre
      .split(' ')
      .map(n => n[0])
      .join('')
      .substring(0,2)
      .toUpperCase();
  }

  function autoResize(el) {

    el.style.height = 'auto';

    el.style.height =
      Math.min(el.scrollHeight, 120) + 'px';
  }

  function escapeHtml(text) {

    const div = document.createElement('div');

    div.innerText = text;

    return div.innerHTML;
  }

  function playSound() {

    try {

      const ctx =
        new(window.AudioContext ||
          window.webkitAudioContext)();

      const osc =
        ctx.createOscillator();

      const gain =
        ctx.createGain();

      osc.connect(gain);

      gain.connect(ctx.destination);

      osc.frequency.value = 700;

      gain.gain.value = 0.02;

      osc.start();

      osc.stop(ctx.currentTime + 0.06);

    } catch {}
  }

  document.getElementById('message-input')
    .addEventListener('keydown', (e) => {

      if (e.key === 'Enter' && !e.shiftKey) {

        e.preventDefault();

        sendMessage();
      }
    });

  document.getElementById('message-input')
    .addEventListener('input', (e) => {

      autoResize(e.target);

      socket.emit(
        'escribiendo',
        chatActivo
      );
    });

  initLogin();
</script>
</body>
</html>
